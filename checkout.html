<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothyhome — Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --green: #2EAA6E; --green-dark: #1e8a56; --pink: #F4879A; --bg: #f7f8fa; --text: #1a2a1e; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); }
    .brand { font-family: 'Nunito', sans-serif; }
    .green-btn { background: linear-gradient(135deg, #2EAA6E 0%, #3ec87f 60%, #2EAA6E 100%); background-size: 200% auto; color: #fff; font-weight: 700; transition: all .3s; }
    .green-btn:hover { background-position: right center; box-shadow: 0 8px 25px rgba(46, 170, 110, .4); transform: translateY(-1px); }
    .outline-btn { border: 2px solid var(--green); color: var(--green); font-weight: 700; transition: all .3s; background: transparent; }
    .outline-btn:hover { background: var(--green); color: #fff; }
    .input-field { background: #fff; border: 1.5px solid #dde8e3; border-radius: 10px; padding: .7rem 1rem; font-family: 'Poppins', sans-serif; font-size: .9rem; color: var(--text); transition: all .2s; width: 100%; outline: none; }
    .input-field:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(46, 170, 110, .1); }
    .input-field::placeholder { color: #aabbb2; }
    header { background: #e1f2e4; }
    footer { background: #1a2a1e; }
    .step-dot { width: 2.5rem; height: 2.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: .9rem; transition: all .3s; font-family: 'Nunito', sans-serif; }
    .step-active { background: var(--green); color: #fff; box-shadow: 0 4px 15px rgba(46, 170, 110, .4); }
    .step-inactive { background: #e8f0eb; color: #aabbb2; }
    .step-line { flex: 1; height: 3px; border-radius: 2px; margin-bottom: 1.4rem; }
    .payment-card { border: 2px solid #dde8e3; border-radius: 14px; padding: 1rem 1.2rem; cursor: pointer; transition: all .2s; }
    .payment-card.selected { border-color: var(--green); background: rgba(46, 170, 110, .04); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp .4s ease both; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5">
        <div class="h-10 md:h-12 overflow-hidden flex items-center"><img src="logo.png" alt="Clothyhome" class="h-full w-auto object-contain" /></div>
      </a>
      <div class="flex items-center gap-3">
        <div class="hidden md:flex items-center gap-1.5 text-sm" style="color:#aabbb2;">
          <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
          Secure Checkout
        </div>
        <a href="login.html" class="hidden md:flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold border-2 transition-colors hover:bg-white/10" style="border-color:var(--green);color:var(--green);">Sign In</a>
      </div>
    </div>
  </header>

  <!-- STEPPER -->
  <div class="max-w-3xl mx-auto px-4 py-8">
    <div class="flex items-center gap-2 mb-8">
      <div class="flex items-center flex-1">
        <div class="flex flex-col items-center">
          <div class="step-dot step-active">1</div>
          <p class="text-xs mt-2 font-bold text-center" style="color:var(--green);">Delivery Address</p>
        </div>
        <div class="step-line" style="background:#e8f0eb;"></div>
      </div>
      <div class="flex items-center flex-1">
        <div class="flex flex-col items-center">
          <div class="step-dot step-inactive">2</div>
          <p class="text-xs mt-2 font-bold text-center" style="color:#aabbb2;">Payment</p>
        </div>
        <div class="step-line" style="background:#e8f0eb;"></div>
      </div>
      <div class="flex items-center">
        <div class="flex flex-col items-center">
          <div class="step-dot step-inactive">3</div>
          <p class="text-xs mt-2 font-bold text-center" style="color:#aabbb2;">Review Order</p>
        </div>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">
      <div class="flex-1">
        <!-- STEP 1: ADDRESS -->
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in" style="border:1px solid #e8f0eb;">
          <h2 class="brand text-xl font-black mb-5" style="color:var(--text);">📍 Delivery Address</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">Full Name *</label>
              <input type="text" class="input-field" placeholder="Your name" />
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">Mobile Number *</label>
              <input type="tel" class="input-field" placeholder="98765 43210" maxlength="10" />
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">Pincode *</label>
              <input type="text" class="input-field" placeholder="560001" maxlength="6" />
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">Address *</label>
              <input type="text" class="input-field" placeholder="House No., Street, Area, Landmark" />
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">City *</label>
              <input type="text" class="input-field" placeholder="Bengaluru" />
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wider mb-1.5" style="color:#5a7a68;">State *</label>
              <select class="input-field">
                <option value="">Select State</option>
                <option>Karnataka</option><option>Maharashtra</option><option>Tamil Nadu</option><option>Rajasthan</option><option>Gujarat</option><option>Delhi</option><option>Kerala</option><option>West Bengal</option><option>Uttar Pradesh</option><option>Andhra Pradesh</option><option>Telangana</option><option>Other</option>
              </select>
            </div>
          </div>
          <div class="flex justify-end mt-6">
            <button class="green-btn px-8 py-3.5 rounded-xl flex items-center gap-2 text-sm font-bold">
              Continue to Payment
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- MINI CART SUMMARY -->
      <div class="lg:w-72 flex-shrink-0">
        <div class="bg-white rounded-2xl shadow-sm p-5 sticky top-24" style="border:1px solid #e8f0eb;">
          <h4 class="brand text-base font-black mb-4" style="color:var(--text);">Your Order</h4>
          <div class="flex gap-2.5 mb-3">
            <img src="images/kundan_necklace.png" class="w-11 h-13 object-cover rounded-xl flex-shrink-0" style="border:1px solid #e8f0eb;" />
            <div class="flex-1 min-w-0">
              <p class="text-xs font-semibold leading-tight truncate" style="color:var(--text);">Kundan Bridal Necklace Set</p>
              <p class="text-xs mt-0.5 font-bold" style="color:var(--green);">₹12,500</p>
            </div>
          </div>
          <div class="flex gap-2.5 mb-3">
            <img src="images/banarasi_saree.png" class="w-11 h-13 object-cover rounded-xl flex-shrink-0" style="border:1px solid #e8f0eb;" />
            <div class="flex-1 min-w-0">
              <p class="text-xs font-semibold leading-tight truncate" style="color:var(--text);">Banarasi Silk Saree — Royal Blue</p>
              <p class="text-xs mt-0.5 font-bold" style="color:var(--green);">₹18,999</p>
            </div>
          </div>
          <div style="border-top:1px solid #e8f0eb;margin-top:.75rem;padding-top:.75rem;">
            <div class="flex justify-between font-black">
              <span class="brand text-sm" style="color:var(--text);">Total</span>
              <span class="brand text-lg" style="color:var(--green);">₹37,169</span>
            </div>
          </div>
          <div class="mt-4 text-center text-xs" style="color:#aabbb2;">🔒 Secured checkout</div>
        </div>
      </div>
    </div>
  </div>

  <footer class="mt-16 py-8 px-6">
    <div class="max-w-7xl mx-auto text-center">
      <div class="flex items-center justify-center gap-2.5 mb-2">
        <div class="h-8 overflow-hidden flex items-center"><img src="logo.png" alt="Clothyhome" class="h-full w-auto object-contain" /></div>
      </div>
      <p class="text-white/40 text-sm">© 2026 Clothyhome. All rights reserved. 🔒 Secured</p>
    </div>
  </footer>
</body>
</html>
